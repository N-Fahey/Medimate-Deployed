services:
  backend-app:
    build:
      context: ./backend
      target: runtime
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/medimate
    depends_on:
      - mongo
    restart: unless-stopped
  mongo:
    image: mongo
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
